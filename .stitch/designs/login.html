<style>
        body {
            background-color: #5C1F2E;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-image: radial-gradient(circle, rgba(209,66,55,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }

<body class="flex items-center justify-center min-h-screen relative overflow-hidden font-body">
<!-- Decorative Elements -->
<div class="absolute inset-0 bg-pattern-circles pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-brand-red opacity-[0.03] blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full bg-brand-red opacity-[0.03] blur-3xl"></div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[400px] mx-4">
<div class="bg-surface-container-lowest rounded-brand-card p-[48px] shadow-2xl shadow-black/20 flex flex-col items-center">
<!-- Logo Header -->
<header class="flex flex-col items-center mb-10">
<h1 class="font-artisan text-[32px] text-brand-red leading-none mb-1">marília</h1>
<div class="bg-brand-badge-bg px-2 py-0.5 rounded-sm">
<span class="font-architect font-semibold text-[10px] text-white tracking-[0.15em] uppercase">[COFFEE BREAK]</span>
</div>
<p class="mt-4 font-architect text-brand-placeholder text-sm tracking-wide">sistema de orçamentos</p>
</header>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- E-mail Input -->
<div class="space-y-2">
<label class="block font-architect font-semibold text-[0.75rem] text-brand-wine tracking-wider uppercase" for="email">
                        E-mail
                    </label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-brand-red/50 text-on-surface font-architect placeholder-brand-placeholder" id="email" name="email" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block font-architect font-semibold text-[0.75rem] text-brand-wine tracking-wider uppercase" for="password">
                            Senha
                        </label>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-brand-red/50 text-on-surface font-architect placeholder-brand-placeholder" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-gradient-to-br from-brand-red to-[#E8635A] text-white font-architect font-bold rounded-[10px] hover:opacity-95 transition-all shadow-md shadow-brand-red/20 active:scale-[0.98]" type="submit">
                    Entrar
                </button>
<!-- Footer Links -->
<div class="flex justify-center pt-4">
<a class="font-architect font-medium text-sm text-brand-red hover:underline decoration-brand-red/30 underline-offset-4" href="#">
                        Esqueci minha senha
                    </a>
</div>
</form>
</div>
<!-- Secondary Decoration (Bento Style Suggestion) -->
<div class="mt-8 flex justify-center space-x-6 opacity-40">
<div class="flex items-center space-x-2 text-rose-200/60">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-architect uppercase tracking-widest">Acesso Seguro</span>
</div>
<div class="flex items-center space-x-2 text-rose-200/60">
<span class="material-symbols-outlined text-sm" data-icon="language">language</span>
<span class="text-[10px] font-architect uppercase tracking-widest">V. 2.4.0</span>
</div>
</div>
</main>
<!-- Visual Polish: Content Image Background (Abstract & Out of Focus) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-10">
<img alt="" class="w-full h-full object-cover grayscale contrast-125 mix-blend-overlay" data-alt="Close-up of artistic coffee latte art with rich crema and soft steam rising in a dimly lit high-end cafe atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwXVUmhhMntp94YdIW7nBpAVKgHI72d955_uNxQA2pkk74LP9f0zSo4F9jHmoshTkHVQIpMTVFK7E32g60hdePNxDy5g0-_2cdRThF5gNHw3GMo09FVh5iJYETLz_795ruNWWCQvck0hJYRdhXYFZmgLDs-04A3ZQ-Mvw8alz_950HyeTORIoNbKDRM9KmihpmY3Ph7QvmgGnCOUhJafdrEExw8tSsBePJ8qDX-xmSgMReGSh_UsupzJQeSDKxECp8nESqvZj7UQ"/>
</div>
